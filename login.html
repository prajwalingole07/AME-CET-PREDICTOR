<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - AME Engineering Latur</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg-dark:#0a0e1a;--bg-darker:#050810;--accent-orange:#ff9a00;--accent-orange-dark:#ff6a00;--text-white:#fff;--text-muted:#bfc7d4;--border-glass:rgba(255,255,255,.08)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 10% 10%,rgba(255,154,0,.16),transparent 28%),radial-gradient(circle at 92% 18%,rgba(0,240,255,.14),transparent 22%),linear-gradient(180deg,var(--bg-dark),var(--bg-darker));color:var(--text-white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;overflow-y:auto;}
    .login-container{position:relative;width:100%;max-width:430px;padding:30px 0;z-index:1}
    .login-container::before{content:'';position:absolute;top:50%;left:50%;width:420px;height:420px;transform:translate(-50%,-50%);background-image:url('logo.png');background-repeat:no-repeat;background-position:center;background-size:contain;opacity:0.08;filter:blur(1px);pointer-events:none;z-index:0}
    .login-card{position:relative;z-index:1;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.14);border-radius:28px;padding:44px 36px;box-shadow:0 25px 80px rgba(0,0,0,.55);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px)}
    .logo-section{text-align:center;margin-bottom:24px}
    .logo{width:76px;height:76px;border-radius:18px;margin:0 auto 16px;display:block;object-fit:cover;box-shadow:0 10px 28px rgba(255,154,0,.16)}
    h1{font-size:28px;font-weight:800;text-align:center;margin:0 0 8px}.subtitle{text-align:center;color:var(--text-muted);font-size:14px;margin:0 0 28px}
    .tabs-container{display:flex;gap:10px;margin-bottom:24px}.tab{flex:1;padding:12px 14px;border-radius:12px;border:1px solid var(--border-glass);background:rgba(255,255,255,.03);color:var(--text-muted);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px}.tab:hover{background:rgba(255,255,255,.06);color:#fff}.tab.active{background:linear-gradient(90deg,var(--accent-orange),var(--accent-orange-dark));border-color:transparent;color:#fff;box-shadow:0 8px 20px rgba(255,154,0,.28)}
    .form-group{margin-bottom:20px}.form-group label{display:block;font-size:12px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .input-wrapper{position:relative}.input-wrapper input{width:100%;padding:14px 48px 14px 44px;border-radius:12px;border:1px solid var(--border-glass);background:rgba(255,255,255,.035);color:#fff;font-size:15px;font-weight:600;outline:none;transition:all .3s ease}.input-wrapper input:focus{border-color:var(--accent-orange);box-shadow:0 0 0 4px rgba(255,154,0,.1);background:rgba(255,255,255,.06)}.input-wrapper input::placeholder{color:rgba(255,255,255,.4)}
    .login-card i{transition:transform .3s ease,color .3s ease,filter .3s ease,text-shadow .3s ease;display:inline-flex;align-items:center;justify-content:center}
    .tab i,.submit-btn i{font-size:1rem;}
    .tab i{color:#fff;opacity:.85;transition:opacity .3s ease,transform .3s ease}
    .tab.active i{opacity:1}
    .tab:hover i{transform:scale(1.05)}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--accent-orange);font-size:18px;filter:drop-shadow(0 0 8px rgba(255,154,0,.36));animation:iconFloat 2.8s ease-in-out infinite}.password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;font-size:18px;transition:color .3s ease}.password-toggle:hover{color:#fff}
    .submit-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--accent-orange),var(--accent-orange-dark));color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:all .3s ease;box-shadow:0 10px 30px rgba(255,154,0,.22);margin-top:8px;display:inline-flex;align-items:center;justify-content:center;gap:10px}.submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 35px rgba(255,154,0,.34)}.submit-btn:active{transform:translateY(0)}
    .register-link{text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border-glass)}.register-link p{color:var(--text-muted);font-size:14px}.register-link a{color:var(--accent-orange);text-decoration:none;font-weight:800}.hidden{display:none!important}
    @keyframes iconFloat{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-58%) scale(1.08)}}
    @media (max-width: 640px) {
      body{padding:16px}
      .login-card{padding:28px 22px}
      h1{font-size:24px}
      .subtitle{font-size:0.95rem}
      .tabs-container{flex-direction:column}
      .tab{width:100%;padding:12px 14px;font-size:0.95rem}
      .input-wrapper input{font-size:0.95rem;padding:12px 44px 12px 44px}
      .submit-btn{padding:14px 16px;font-size:0.95rem}
      .register-link{margin-top:18px}
    }
    @media (max-width: 480px) {
      .login-card{padding:24px 18px}
      h1{font-size:22px}
      .subtitle{font-size:0.9rem}
      .input-wrapper input{padding:12px 40px 12px 42px}
      .password-toggle{right:10px}
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <img src="logo.png" class="logo" alt="AME Engineering Latur Logo">
        <h1>AME Cet Predictor</h1>
        <p class="subtitle">ADMISSIONS MADE EASY, LATUR</p>
      </div>

      <div class="tabs-container">
        <button id="tabStudent" class="tab active" type="button"><i class="fa-solid fa-user-graduate"></i> Student Login</button>
        <button id="tabAdmin" class="tab" type="button"><i class="fa-solid fa-user-shield"></i> Admin Login</button>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginMobile">Mobile Number</label>
          <div class="input-wrapper"><i class="fa-solid fa-mobile-screen-button input-icon"></i><input id="loginMobile" type="tel" inputmode="numeric" pattern="\d{10}" maxlength="10" placeholder="Enter 10-digit mobile number" required></div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper"><i class="fa-solid fa-lock input-icon"></i><input id="loginPassword" type="password" placeholder="Enter password" required><button type="button" class="password-toggle" id="togglePw"><i class="fa-regular fa-eye"></i></button></div>
        </div>
        <button type="submit" class="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal</button>
        <div class="register-link"><p>New here? <a href="register.html">Register Now</a></p></div>
      </form>
      <form id="adminLoginForm" class="hidden">
        <div class="form-group">
          <label for="adminUser">Admin Username</label>
          <div class="input-wrapper"><i class="fa-solid fa-user-tie input-icon"></i><input id="adminUser" type="text" placeholder="Enter admin username" required></div>
        </div>
        <div class="form-group">
          <label for="adminPass">Password</label>
          <div class="input-wrapper"><i class="fa-solid fa-shield-halved input-icon"></i><input id="adminPass" type="password" placeholder="Enter password" required><button type="button" class="password-toggle" id="toggleAdminPw"><i class="fa-regular fa-eye"></i></button></div>
        </div>
        <button type="submit" class="submit-btn"><i class="fa-solid fa-key"></i> Sign In as Admin</button>
      </form>
    </div>
  </div>
  <script>
    const AUTH_ADMIN_USERNAME = 'Ame2026';
    const AUTH_ADMIN_PASSWORD = 'Ame@2026#';
    const USER_STORAGE_KEY = 'ame_users';
    const tabStudent = document.getElementById('tabStudent');
    const tabAdmin = document.getElementById('tabAdmin');
    const loginForm = document.getElementById('loginForm');
    const adminLoginForm = document.getElementById('adminLoginForm');

    tabStudent.addEventListener('click', () => { tabStudent.classList.add('active'); tabAdmin.classList.remove('active'); loginForm.classList.remove('hidden'); adminLoginForm.classList.add('hidden'); });
    tabAdmin.addEventListener('click', () => { tabAdmin.classList.add('active'); tabStudent.classList.remove('active'); adminLoginForm.classList.remove('hidden'); loginForm.classList.add('hidden'); });

    function togglePassword(inputId, btnId){ const input=document.getElementById(inputId); const btn=document.getElementById(btnId); input.type=input.type==='password'?'text':'password'; btn.innerHTML=input.type==='password'?'<i class="fa-regular fa-eye"></i>':'<i class="fa-regular fa-eye-slash"></i>'; }
    document.getElementById('togglePw').addEventListener('click', () => togglePassword('loginPassword','togglePw'));
    document.getElementById('toggleAdminPw').addEventListener('click', () => togglePassword('adminPass','toggleAdminPw'));

    async function loadUsers(){
      try { const response = await fetch('/api/users', { cache: 'no-store' }); if (response.ok) return await response.json(); } catch(e) {}
      try { const r = localStorage.getItem(USER_STORAGE_KEY); return r ? JSON.parse(r) : []; } catch(e) { return []; }
    }
    function saveCurrent(user){ localStorage.setItem('ame_current_user', JSON.stringify(user)); }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const mobile = document.getElementById('loginMobile').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (!mobile || !pass) return alert('Please enter mobile number and password');
      if (!/^[0-9]{10}$/.test(mobile)) return alert('Please enter a valid 10-digit mobile number.');
      const users = await loadUsers();
      const u = users.find(x => x.mobile === mobile || x.name === mobile);
      if (!u) return alert('No account found for this mobile number. Please register first.');
      if (!u.paid) return alert('Your payment is not confirmed yet. Please complete payment to access the portal.');
      if (!u.approved) return alert('Your account is pending admin approval. Please wait for admin to verify your account.');
      if (u.password !== pass) return alert('Invalid password. Please try again.');
      saveCurrent({ role: 'student', name: u.name, mobile: u.mobile });
      window.location.href = 'predictor.html';
    });

    adminLoginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      if (user === AUTH_ADMIN_USERNAME && pass === AUTH_ADMIN_PASSWORD) {
        saveCurrent({ role: 'admin', name: 'Admin' });
        window.location.href = 'admin.html';
      } else {
        alert('Invalid admin credentials. Please try again.');
      }
    });
  </script>
</body>
</html>
